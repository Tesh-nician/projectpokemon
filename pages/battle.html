<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battle</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <div class="battle-main-container">
      <div class="battle-player-container">
        <!--  container pour afficher myPokemon, image, hp et barre de santé -->
         <div id="my-health-div">
          <!-- barre de santé , selectionné avec getId et puis appendChild-->

         </div>

        <div class="battle-my-text-box">
            
        </div>

        <!-- <h1>TEST POSITIONING MY POKEMON</h1> -->
       
      </div>
      <!-- fin du player container -->

      <div class="battle-adversary-container">
        <!-- container pour afficher image adversaire, hp, barre de santé -->

        <div id="adversary-health-div">
          <!-- barre de santé, selectionné avec getId et puis appendChild-->

         </div>

        <div class="battle-adversary-text-box">
            
        </div>

        <div class="battle-adversary-image-box">


        </div>

        <!-- <h1>TEST POSITIONING ADVERSARY</h1> -->
      </div>
      <!-- fin du adversary container -->

      <div class="battle-message-container">
        <!-- container pour les messages de combat -->

        <h1>MESSAGE CONTAINER</h1>
      </div>
      <!-- fin du message container -->

      <div class="battle-actions-container">
        <!-- container pour le 4 boutons d'attaque  -->

        <!-- <h1>ACTIONS CONTAINER TEST</h1> -->
        <button class="battle-action-button" id="attaque1">Attack1</button>
        <button class="battle-action-button" id="attaque2">Attack2</button>
        <button class="battle-action-button" id="attaque3">Attack3</button>
        <button class="battle-action-button" id="attaque4">Attack4</button>
      </div>
    </div>
    <!-- fin du main container -->
  </body>

 <script type="module">
          import { Dracaufeu } from "/js/model/dracaufeu.js";
          import { Tartiflette } from "/js/model/tartiflette.js";
          import { Tortank } from "/js/model/tortank.js";
          import { Pokemon } from "/js/model/pokemon.js";
          console.log(
            "Selected Pokemon: " + localStorage.getItem("selectedPokemon"),
          );

           /* myPokemon vient du localStorage avec un switch  */ 

          let selectedPokemon = localStorage.getItem("selectedPokemon");
          /* creation du myPokemon sur base du variable selectedPokemon */
          let myPokemon;
          switch (selectedPokemon.toLowerCase()) {
            case "dracaufeu":
              myPokemon = new Dracaufeu();
              break;
            case "tartiflette":
              myPokemon = new Tartiflette();
              break;
            case "tortank":
              myPokemon = new Tortank();
              break;
            default:
              console.log("Unknown Pokemon selected");
          }

          console.log("myPokemon object created:", myPokemon);

          

          /* appendchild au container pour montrer le pokemon selectionné */

          let playerContainer = document.querySelector(".battle-player-container");
          let pokemonImage = document.createElement("img");
          pokemonImage.src = myPokemon.pokurl;
          pokemonImage.style.width = "300px";
          pokemonImage.style.height = "auto";
          playerContainer.appendChild(pokemonImage);

        /*  add pokeName, hp and maxhp to battle-my-text-box */
          let myTextBox = document.querySelector(".battle-my-text-box");
          myTextBox.innerHTML = `${myPokemon.pokeName}<br>HP: ${myPokemon.hp}/${myPokemon.maxhp}`;


          /* rajoute du health bar a my-health-div: hp/maxhp * largeur du div */

           /* https://www.w3schools.com/howto/howto_js_progressbar.asp*/

          let healthBar = document.createElement("div");
          healthBar.id = "my-health-bar";
          healthBar.style.width = `${(myPokemon.hp / myPokemon.maxhp) * 300}px`;
          healthBar.style.height = "20px";
          healthBar.style.backgroundColor = "green";
          healthBar.style.borderRadius = "10px";
          healthBar.style.marginBottom = "10px";
         
          let myHealthDiv = document.getElementById("my-health-div");
          myHealthDiv.appendChild(healthBar);


          /* adversary pokemon viens de localStorage */


          let adversaryPokemonName = localStorage.getItem("adversaryPokemon");
          console.log("Adversary Pokemon: " + adversaryPokemonName);

          /* creation du object adversary pokemon sur base du variable selectedPokemon (viens de localStorage) */
          let adversaryPokemon;
          switch (adversaryPokemonName.toLowerCase()) {
            case "dracaufeu":
              adversaryPokemon = new Dracaufeu();
              break;
            case "tartiflette":
              adversaryPokemon = new Tartiflette();
              break;
            case "tortank":
              adversaryPokemon = new Tortank();
              break;
            default:
              console.log("Unknown Adversary Pokemon selected");
          }

          console.log("adversaryPokemon object created:", adversaryPokemon);

          

          /* appendchild au container pour montrer le pokemon selectionné */

          let adversaryContainer = document.querySelector(".battle-adversary-image-box");
          let adversaryImage = document.createElement("img");
          adversaryImage.src = adversaryPokemon.pokurl;
          adversaryImage.style.width = "200px";
          adversaryImage.style.height = "auto";
          adversaryImage.style.position = "absolute";
          adversaryImage.style.top = "60%";
          adversaryContainer.appendChild(adversaryImage);

        /*  add pokeName, hp and maxhp to battle-adversary-text-box */
          let adversaryTextBox = document.querySelector(".battle-adversary-text-box");
          adversaryTextBox.innerHTML = `${adversaryPokemon.pokeName}<br>HP: ${adversaryPokemon.hp}/${adversaryPokemon.maxhp}`;


           /* rajoute du health bar a adversary-health-div: hp/maxhp * largeur du div */

           /* https://www.w3schools.com/howto/howto_js_progressbar.asp*/
          let adversaryHealthBar = document.createElement("DIV");
          adversaryHealthBar.id = "adversary-health-bar";
          adversaryHealthBar.style.width = `${(adversaryPokemon.hp / adversaryPokemon.maxhp) * 300}px`;
          adversaryHealthBar.style.height = "20px";
          adversaryHealthBar.style.backgroundColor = "red";
          adversaryHealthBar.style.borderRadius = "10px";
         
          let adversaryHealthDiv = document.getElementById("adversary-health-div");
          adversaryHealthDiv.appendChild(adversaryHealthBar);


          /* rajouter les event listeners et attack names au attack buttons  */

          let attack1Button = document.getElementById("attaque1");
          attack1Button.innerHTML = myPokemon.attack1name;
          let attack2Button = document.getElementById("attaque2");
          attack2Button.innerHTML = myPokemon.attack2name;
          
          let attack3Button = document.getElementById("attaque3");
          attack3Button.innerHTML = myPokemon.attack3name;
          
          let attack4Button = document.getElementById("attaque4");
          attack4Button.innerHTML = myPokemon.attack4name;

          /* gestion des 4 boutons d'attaque */
          
          let messageContainer = document.querySelector(".battle-message-container");

          attack1Button.addEventListener("click", () => {
            let attackResult = myPokemon.attack1(adversaryPokemon);
            console.log("Attack 1: " + attackResult);
            adversaryPokemon.hp-=attackResult;

            /* appeller le post-attack functions pour faire le update du battle message container et check fin du battaille */
              messageContainer.innerHTML = `Tu utilises un ${myPokemon.attack1name} pour attaquer le ${adversaryPokemon.pokeName}.`;
            setTimeout(() => {
              updateMonAttaque(myPokemon, adversaryPokemon, attackResult);
            }, 2000);
            
            checkFinDuBataille(myPokemon, adversaryPokemon);
            console.log("Adversary Pokemon HP after attack: " + adversaryPokemon.hp);
           setTimeout(() => {
             contreAttaque(adversaryPokemon, myPokemon);
           }, 2000);

            checkFinDuBataille(myPokemon, adversaryPokemon);          
            

          });
          attack2Button.addEventListener("click", () => {
            let attackResult = myPokemon.attack2(adversaryPokemon);
            console.log("Attack 2: " + attackResult);
            adversaryPokemon.hp-=attackResult;
            
            /* appeller le post-attack functions pour faire le update du battle message container et check fin du battaille */
            messageContainer.innerHTML = `Tu utilises un ${myPokemon.attack2name} pour attaquer le ${adversaryPokemon.pokeName}.`;
            
            setTimeout(() => {
              updateMonAttaque(myPokemon, adversaryPokemon, attackResult);
            }, 2000);
            checkFinDuBataille(myPokemon, adversaryPokemon);
            
            console.log("Adversary Pokemon HP after attack: " + adversaryPokemon.hp);

            setTimeout(() => {
              contreAttaque(adversaryPokemon, myPokemon);
            }, 2000);

            checkFinDuBataille(myPokemon, adversaryPokemon);  
          });

          attack3Button.addEventListener("click", () => {
            let attackResult = myPokemon.attack3(adversaryPokemon);
            console.log("Attack 3: " + attackResult);
            adversaryPokemon.hp-=attackResult;
            
            /* appeller le post-attack functions pour faire le update du battle message container et check fin du battaille */
            messageContainer.innerHTML = `Tu utilises un ${myPokemon.attack3name} pour attaquer le ${adversaryPokemon.pokeName}.`;

            setTimeout(() => {
              updateMonAttaque(myPokemon, adversaryPokemon, attackResult);
            }, 2000);
            
            checkFinDuBataille(myPokemon, adversaryPokemon);
            
            console.log("Adversary Pokemon HP after attack: " + adversaryPokemon.hp);
            
            setTimeout(() => {
              contreAttaque(adversaryPokemon, myPokemon);
            }, 2000);
          });

          attack4Button.addEventListener("click", () => {
            let attackResult = myPokemon.attack4(adversaryPokemon);
            console.log("Attack 4: " + attackResult);
            adversaryPokemon.hp-=attackResult;
            
            /* appeller le post-attack functions pour faire le update du battle message container et check fin du battaille */
            messageContainer.innerHTML = `Tu utilises un ${myPokemon.attack4name} pour attaquer le ${adversaryPokemon.pokeName}.`;
            setTimeout(() => {
              updateMonAttaque(myPokemon, adversaryPokemon, attackResult);
            }, 2000);
            
            checkFinDuBataille(myPokemon, adversaryPokemon);
            
            console.log("Adversary Pokemon HP after attack: " + adversaryPokemon.hp);
            
            setTimeout(() => {
              contreAttaque(adversaryPokemon, myPokemon);
            }, 2000);

          });



          /*tous les fonctions pour mettre-ajour le message container, les barres de santé, et vérifier la fin de la bataille */



          function updateMonAttaque(myPokemon, adversaryPokemon, attackResult) {

            /* Update myPokemon health bar */
            healthBar.style.width = `${(myPokemon.hp / myPokemon.maxhp) * 300}px`;

            
             /* update barre de santé */
            adversaryHealthBar.style.width = `${(adversaryPokemon.hp / adversaryPokemon.maxhp) * 300}px`;
            /*update text box adversary pokemon hp */
            let adversaryTextBox = document.querySelector(".battle-adversary-text-box");
            adversaryTextBox.innerHTML = `${adversaryPokemon.pokeName}<br>HP: ${adversaryPokemon.hp}/${adversaryPokemon.maxhp}`;

            /* battle message according to the attackResult */
            let battleMessageContainer = document.querySelector(".battle-message-container");
            switch (true) {
              case (attackResult<0):
                battleMessageContainer.innerHTML = `Attaque contre-productive qui renforce l'adversaire!`;
                break;
              case (attackResult<10):
                battleMessageContainer.innerHTML = `Attaque de bof`;
                break;
              case (attackResult<30):
                battleMessageContainer.innerHTML = `Attaque assez efficace!`;
                break;
              case (attackResult<50):
                battleMessageContainer.innerHTML = `Attaque super efficace!`;
                break;
              case (attackResult>=50):
                battleMessageContainer.innerHTML = `Attaque super-puissante de woke qui défonce complètement l'adversaire!`;
                break;

              default:
                battleMessageContainer.innerHTML = `Erreur dans le switch de l'attaque!`;
            }


          }

          function contreAttaque(adversaryPokemon, myPokemon) {
           
           /* Randomiser l'attaque de l'adversaire */
            let battleMessageContainer = document.querySelector(".battle-message-container");
            let choixDAttaqueAdversaire = Math.floor(Math.random() * 4) + 1;

            let attackResult = 0;

                        

           switch (choixDAttaqueAdversaire) {
            case 1:
              attackResult = adversaryPokemon.attack1(myPokemon);
              battleMessageContainer.innerHTML = `${adversaryPokemon.pokeName} utilise un ${adversaryPokemon.attack1name} et a fait ${attackResult} de dégâts!`;
              
              break;

            case 2:
              attackResult = adversaryPokemon.attack2(myPokemon);
              battleMessageContainer.innerHTML = `${adversaryPokemon.pokeName} utilise un ${adversaryPokemon.attack2name} et a fait ${attackResult} de dégâts!`;

              break;

            case 3:
              attackResult = adversaryPokemon.attack3(myPokemon);
              battleMessageContainer.innerHTML = `${adversaryPokemon.pokeName} utilise un ${adversaryPokemon.attack3name} et a fait ${attackResult} de dégâts!`;

              break;

            case 4:
              attackResult = adversaryPokemon.attack4(myPokemon);
              battleMessageContainer.innerHTML = `${adversaryPokemon.pokeName} utilise un ${adversaryPokemon.attack4name} et a fait ${attackResult} de dégâts!`;

              break;  

            default: console.log("Erreur dans le switch de la contre-attaque de l'adversaire");
           }

           



            setTimeout(() => {   
            switch (true) {
              case (attackResult<0):
                battleMessageContainer.innerHTML = `Attaque contre-productive qui renforce l'adversaire!`;
                break;
              case (attackResult<10):
                battleMessageContainer.innerHTML = `Attaque de bof`;
                break;
              case (attackResult<30):
                battleMessageContainer.innerHTML = `Attaque assez efficace!`;
                break;
              case (attackResult<50):
                battleMessageContainer.innerHTML = `Attaque super efficace!`;
                break;
              case (attackResult>=50):
                battleMessageContainer.innerHTML = `Attaque super-puissante de woke qui défonce complètement l'adversaire!`;
                break;

              default:
                battleMessageContainer.innerHTML = `Erreur dans le switch de l'attaque!`;
            }

            console.log("Adversary counter-attack: " + attackResult);
            myPokemon.hp -= attackResult;

            

            /* update barre de santé */
            healthBar.style.width = `${(myPokemon.hp / myPokemon.maxhp) * 300}px`;
            /*update text box adversary pokemon hp */
            let myTextBox = document.querySelector(".battle-my-text-box");
            myTextBox.innerHTML = `${myPokemon.pokeName}<br>HP: ${myPokemon.hp}/${myPokemon.maxhp}`;

            }, 2000);

            checkFinDuBataille(myPokemon, adversaryPokemon);
           
          }


          function disableAttackButtons() {
            attack1Button.disabled = true;
            attack2Button.disabled = true;
            attack3Button.disabled = true;
            attack4Button.disabled = true;
          }

          function checkFinDuBataille(myPokemon, adversaryPokemon) {
            let enemyImageContainer = document.querySelector(".battle-adversary-image-box");
            let myImageContainer = document.querySelector(".battle-player-container");
            let battleMessageContainer = document.querySelector(".battle-message-container");
            if (adversaryPokemon.hp <= 0) {
              battleMessageContainer.innerHTML = `T'a gagné! ${myPokemon.pokeName} a complétement défoncé le ${adversaryPokemon.pokeName}!`;
              enemyImageContainer.style.opacity = 0.5;
              enemyImageContainer.style.scale = "0.8";
              myImageContainer.style.scale = "1.2";
              disableAttackButtons();
            } else if (myPokemon.hp <= 0) {
              battleMessageContainer.innerHTML = `T'a perdu! Ton ${myPokemon.pokeName} a été défoncé par le ${adversaryPokemon.pokeName}!`;
              myImageContainer.style.opacity = 0.5;
              myImageContainer.style.scale = "0.8";
              enemyImageContainer.style.scale = "1.2";
              disableAttackButtons();
            }
          }


          
                  
        </script>

</html>
