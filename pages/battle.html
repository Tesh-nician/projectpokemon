<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battle</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <div class="battle-main-container">
      <div class="battle-player-container">
        <!-- player container is on the bottom-left of the page. It contains the image of the player's selected pokemon. Above the image is a box mentioning maximum and current hp. Above the box is a health bar. -->
         <div id="my-health-div">
          <!-- barre de santé vient ici, selectionné avec getId et puis appendChild-->

         </div>

        <div class="battle-my-text-box">
            
        </div>

        <!-- <h1>TEST POSITIONING MY POKEMON</h1> -->
       
      </div>
      <!-- fin du player container -->

      <div class="battle-adversary-container">
        <!-- the adversary container is on the top-right of the page. It contains the image of the adversary's selected pokemon. To the left of the image is a box mentioning maximum and current hp.  Under the box is a health bar. -->

        <h1>ADVERSARY</h1>
      </div>
      <!-- fin du adversary container -->

      <div class="battle-message-container">
        <!-- the message container is a box in the middle of the page, with a message box that displays the actions of the player and the adversary during the battle -->

        <h1>MESSAGE CONTAINER</h1>
      </div>
      <!-- fin du message container -->

      <div class="battle-actions-container">
        <!-- the actions container is a box on the bottom-right of the page. It contains the four buttons with the 4 attacks of the player's selected pokemon.  -->

        <h1>ACTIONS CONTAINER</h1>
      </div>
    </div>
    <!-- fin du main container -->
  </body>

 <script type="module">
          import { Dracaufeu } from "/js/model/dracaufeu.js";
          import { Tartiflette } from "/js/model/tartiflette.js";
          import { Tortank } from "/js/model/tortank.js";
          import { Pokemon } from "/js/model/pokemon.js";
          console.log(
            "Selected Pokemon: " + localStorage.getItem("selectedPokemon"),
          );

           /* myPokemon vient du localStorage avec un switch  */ 

          let selectedPokemon = localStorage.getItem("selectedPokemon");
          /* create myPokemon object based on the selectedPokemon value */
          let myPokemon;
          switch (selectedPokemon.toLowerCase()) {
            case "dracaufeu":
              myPokemon = new Dracaufeu();
              break;
            case "tartiflette":
              myPokemon = new Tartiflette();
              break;
            case "tortank":
              myPokemon = new Tortank();
              break;
            default:
              console.log("Unknown Pokemon selected");
          }

          console.log("myPokemon object created:", myPokemon);

          

          /* appendchild au container pour montrer le pokemon selectionné */

          let playerContainer = document.querySelector(".battle-player-container");
          let pokemonImage = document.createElement("img");
          pokemonImage.src = myPokemon.pokurl;
          pokemonImage.style.width = "300px";
          pokemonImage.style.height = "auto";
          playerContainer.appendChild(pokemonImage);

        /*  add pokeName, hp and maxhp to battle-my-text-box */
          let myTextBox = document.querySelector(".battle-my-text-box");
          myTextBox.innerHTML = `${myPokemon.pokeName}<br>HP: ${myPokemon.hp}/${myPokemon.maxhp}`;


           /* add a health bar to my-health-div with a width proportional to the hp/maxhp ratio of myPokemon */
          let healthBar = document.createElement("div");
          healthBar.id = "my-health-bar";
          healthBar.style.width = `${(myPokemon.hp / myPokemon.maxhp) * 300}px`;
          healthBar.style.height = "20px";
          healthBar.style.backgroundColor = "green";
          healthBar.style.borderRadius = "10px";
          healthBar.style.marginBottom = "10px";
         
          let myHealthDiv = document.getElementById("my-health-div");
          myHealthDiv.appendChild(healthBar);


          /* Get the adversary pokemon from localStorage */


          let adversaryPokemonName = localStorage.getItem("adversaryPokemon");
          console.log("Adversary Pokemon: " + adversaryPokemonName);

          /* create adversary pokemon object based on the selectedPokemon value */
          let adversaryPokemon;
          switch (adversaryPokemonName.toLowerCase()) {
            case "dracaufeu":
              adversaryPokemon = new Dracaufeu();
              break;
            case "tartiflette":
              adversaryPokemon = new Tartiflette();
              break;
            case "tortank":
              adversaryPokemon = new Tortank();
              break;
            default:
              console.log("Unknown Adversary Pokemon selected");
          }

          console.log("adversaryPokemon object created:", adversaryPokemon);

          

          /* appendchild au container pour montrer le pokemon selectionné */

          let adversaryContainer = document.querySelector(".battle-adversary-container");
          let adversaryImage = document.createElement("img");
          adversaryImage.src = adversaryPokemon.pokurl;
          adversaryImage.style.width = "300px";
          adversaryImage.style.height = "auto";
          adversaryContainer.appendChild(adversaryImage);

        /*  add pokeName, hp and maxhp to battle-adversary-text-box */
          let adversaryTextBox = document.querySelector(".battle-adversary-text-box");
          adversaryTextBox.innerHTML = `${adversaryPokemon.pokeName}<br>HP: ${adversaryPokemon.hp}/${adversaryPokemon.maxhp}`;


           /* add a health bar to my-health-div with a width proportional to the hp/maxhp ratio of myPokemon */
          let opponentHealthBar = document.createElement("div");
          opponentHealthBar.id = "opponent-health-bar";
          opponentHealthBar.style.width = `${(adversaryPokemon.hp / adversaryPokemon.maxhp) * 300}px`;
          opponentHealthBar.style.height = "20px";
          opponentHealthBar.style.backgroundColor = "red";
          opponentHealthBar.style.borderRadius = "10px";
         
          let opponentHealthDiv = document.getElementById("opponent-health-div");
          opponentHealthDiv.appendChild(opponentHealthBar);


          
                  
        </script>

</html>
